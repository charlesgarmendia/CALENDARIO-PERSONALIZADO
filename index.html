<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PWA Elite - Mariangel ✨</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --gold: #ffd700;
            --gold-light: #fff1b8;
            --gold-dark: #b8860b;
            --blue: #4a90e2;
            --blue-light: #7bb0ff;
            --blue-dark: #2a5f9e;
            --purple: #9b59b6;
            --pink: #ff6b9d;
            --dark: #1a1a2e;
            --dark-light: #16213e;
            --glass: rgba(255, 255, 255, 0.15);
            --glass-dark: rgba(0, 0, 0, 0.65);
            --glass-darker: rgba(0, 0, 0, 0.8);
        }

        body {
            font-family: 'Segoe UI', 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            position: relative;
        }

        /* Fondo dinámico con overlay */
        .dynamic-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease-in-out;
            z-index: -1;
        }

        .dynamic-background::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(3px);
            z-index: -1;
        }

        /* Pantallas */
        .screen {
            display: none;
            flex: 1;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        .screen.active {
            display: flex;
        }

        /* Header con efecto vidrio mejorado y centrado */
        .glass-header {
            background: var(--glass-darker);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-bottom: 2px solid var(--gold);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .greeting {
            font-size: 1.5rem;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
        }

        .greeting span {
            color: var(--gold);
            font-weight: 700;
            text-shadow: 0 0 10px rgba(255,215,0,0.8);
        }

        /* Botón de descarga amarillo */
        .download-btn {
            background: linear-gradient(145deg, #ffd700, #ffa500);
            border: none;
            color: #1a1a2e;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 10px 0 #b8860b, 0 5px 20px rgba(255,215,0,0.5);
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 10px auto;
            width: fit-content;
            border: 2px solid white;
            animation: pulse 2s infinite;
        }

        .download-btn:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #b8860b, 0 5px 20px rgba(255,215,0,0.5);
        }

        .download-btn.hidden {
            display: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Botones con efecto 3D y transparencia */
        .btn {
            background: linear-gradient(145deg, rgba(42,42,64,0.9), rgba(26,26,46,0.9));
            backdrop-filter: blur(5px);
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 12px 24px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 10px 0 var(--gold-dark), 0 5px 15px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 var(--gold-dark), 0 5px 15px rgba(0,0,0,0.5);
        }

        .btn-primary {
            background: linear-gradient(145deg, rgba(74,144,226,0.9), rgba(42,95,158,0.9));
            border-color: white;
            color: white;
            box-shadow: 0 10px 0 var(--blue-dark);
        }

        /* Pantalla de meses - Grid mejorado */
        .months-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .month-card {
            aspect-ratio: 1/1;
            background-size: cover;
            background-position: center;
            border: 3px solid var(--gold);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        /* Overlay para mejorar legibilidad del texto */
        .month-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            z-index: 1;
            transition: all 0.3s ease;
        }

        .month-card:hover::before {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(0);
        }

        .month-card:hover {
            transform: scale(1.05) rotate(2deg);
            border-color: var(--blue);
            box-shadow: 0 0 30px var(--gold);
        }

        .month-card .month-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--gold);
            text-shadow: 0 0 15px rgba(255,215,0,0.8), 2px 2px 4px black;
            position: relative;
            z-index: 2;
        }

        .month-card .month-number {
            font-size: 1rem;
            color: white;
            text-shadow: 1px 1px 2px black;
            position: relative;
            z-index: 2;
        }

        .month-card .month-year {
            margin-top: 10px;
            font-size: 0.8rem;
            color: white;
            text-shadow: 1px 1px 2px black;
            position: relative;
            z-index: 2;
            background: rgba(0,0,0,0.5);
            padding: 2px 8px;
            border-radius: 10px;
        }

        /* Pantalla de días */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--glass);
            backdrop-filter: blur(5px);
            margin: 10px;
            border-radius: 15px;
            border: 1px solid var(--gold);
        }

        .current-month {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            text-shadow: 0 0 20px gold, 2px 2px 4px black;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            padding: 10px;
            text-align: center;
            color: var(--gold);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            background: var(--glass);
            backdrop-filter: blur(5px);
            margin: 0 10px 10px 10px;
            border-radius: 10px;
            border: 1px solid rgba(255,215,0,0.3);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            padding: 15px;
            flex: 1;
            overflow-y: auto;
        }

        .day-btn {
            aspect-ratio: 1/1;
            background: var(--glass);
            backdrop-filter: blur(4px);
            border: 2px solid transparent;
            color: white;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            text-shadow: 1px 1px 2px black;
        }

        .day-btn:active {
            transform: scale(0.9);
            border-color: var(--blue);
            box-shadow: 0 0 20px var(--blue);
            background: rgba(74,144,226,0.3);
        }

        .day-btn.has-note::after {
            content: '📝';
            position: absolute;
            top: 2px;
            right: 2px;
            font-size: 0.7rem;
            filter: drop-shadow(0 2px 2px black);
        }

        .day-btn.today {
            border-color: var(--gold);
            box-shadow: 0 0 20px var(--gold);
            background: rgba(255,215,0,0.2);
        }

        /* Footer con imagen mejorado */
        .footer-preview {
            height: 100px;
            background: var(--glass-darker);
            backdrop-filter: blur(10px);
            border-top: 3px solid var(--gold);
            padding: 8px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .preview-container {
            max-width: 200px;
            margin: 0 auto;
            height: 100%;
        }

        .preview-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid var(--gold);
            box-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--glass-darker);
            backdrop-filter: blur(15px);
            border: 3px solid var(--gold);
            padding: 25px;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 50px var(--gold);
            animation: modalPop 0.3s ease;
        }

        @keyframes modalPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-title {
            color: var(--gold);
            font-size: 2rem;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 10px gold;
        }

        .modal-textarea {
            width: 100%;
            height: 150px;
            background: rgba(0,0,0,0.5);
            border: 2px solid var(--blue);
            border-radius: 15px;
            color: white;
            padding: 15px;
            font-size: 1rem;
            margin: 20px 0;
            resize: none;
        }

        .modal-textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 20px gold;
        }

        /* Botón flotante */
        .fab {
            position: fixed;
            bottom: 120px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(145deg, var(--gold), var(--gold-dark));
            border: none;
            color: var(--dark);
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255,215,0,0.5);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .fab:active {
            transform: scale(0.9) rotate(90deg);
        }

        /* Upload area */
        .upload-area {
            display: flex;
            justify-content: center;
            padding: 10px;
            background: var(--glass);
            backdrop-filter: blur(5px);
            margin: 10px;
            border-radius: 30px;
        }

        .upload-btn {
            background: linear-gradient(145deg, var(--purple), #8e44ad);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #6c3483;
        }
    </style>
</head>
<body>

<!-- Fondo Dinámico -->
<div id="dynamic-background" class="dynamic-background"></div>

<!-- Pantalla de Meses -->
<div id="months-screen" class="screen active">
    <div class="glass-header">
        <div class="greeting">
            <span id="greeting-text">Cargando...</span>, <span id="user-name">Mariangel</span> ✨
        </div>
    </div>

    <!-- Botón de descarga amarillo -->
    <button id="downloadAppBtn" class="download-btn" onclick="installPWA()">📲 DESCARGAR APP</button>

    <div class="months-grid" id="months-grid">
        <!-- Los meses se generarán con JS -->
    </div>

    <div class="upload-area">
        <button class="upload-btn" onclick="document.getElementById('file-input').click()">
            📸 + AÑADIR FOTOS
        </button>
        <input type="file" id="file-input" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files)">
    </div>
</div>

<!-- Pantalla de Días -->
<div id="days-screen" class="screen">
    <div class="glass-header">
        <div style="display: flex; align-items: center; justify-content: space-between; gap: 10px;">
            <button class="btn" onclick="goToMonths()" style="padding: 8px 15px;">←</button>
            <div class="greeting">
                <span id="selected-month-display">Enero 2026</span>
            </div>
            <div style="width: 40px;"></div>
        </div>
    </div>

    <div class="calendar-header">
        <button class="btn" style="padding: 8px 15px;" onclick="changeMonth(-1)">←</button>
        <span class="current-month" id="current-month-title">Enero</span>
        <button class="btn" style="padding: 8px 15px;" onclick="changeMonth(1)">→</button>
    </div>

    <div class="weekdays">
        <span>LUN</span><span>MAR</span><span>MIÉ</span><span>JUE</span><span>VIE</span><span>SÁB</span><span>DOM</span>
    </div>

    <div class="calendar-grid" id="calendar-days"></div>

    <div class="footer-preview">
        <div class="preview-container">
            <img id="day-preview" class="preview-image" src="" alt="Imagen destacada">
        </div>
    </div>
</div>

<!-- Modal de Notas -->
<div id="note-modal" class="modal">
    <div class="modal-content">
        <div class="modal-title" id="modal-title">1 Enero 2026</div>
        <textarea id="note-text" class="modal-textarea" placeholder="Escribe tu nota especial aquí..."></textarea>
        <div style="display: flex; gap: 10px;">
            <button class="btn" style="flex:1;" onclick="closeModal()">💾 Guardar</button>
            <button class="btn btn-primary" style="flex:1;" onclick="closeModal()">Cerrar</button>
        </div>
    </div>
</div>

<!-- Botón flotante para cambiar imagen -->
<button class="fab" onclick="randomizeImage()">✨</button>

<script>
    // Configuración
    const totalDefaultImages = 50;
    const months = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
    const monthsShort = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"];
    
    // Estado
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth();
    let selectedMonth = currentMonth;
    let selectedYear = currentYear;
    let userImages = JSON.parse(localStorage.getItem('user_album')) || [];
    let currentPreviewImage = '';
    
    // Variables para PWA
    let deferredPrompt;
    const downloadBtn = document.getElementById('downloadAppBtn');

    // Detectar si la app ya está instalada
    window.addEventListener('load', () => {
        // Verificar si está en modo standalone (instalada)
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || 
                            window.navigator.standalone || 
                            document.referrer.includes('android-app://');
        
        if (isStandalone) {
            downloadBtn.classList.add('hidden');
        }
    });

    // Capturar el evento beforeinstallprompt
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        
        // Mostrar el botón solo si no está instalada
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || 
                            window.navigator.standalone;
        
        if (!isStandalone) {
            downloadBtn.classList.remove('hidden');
        }
    });

    // Función para instalar la PWA
    function installPWA() {
        if (!deferredPrompt) {
            alert('Para instalar la app, usa el menú de tu navegador y selecciona "Añadir a pantalla de inicio"');
            return;
        }

        deferredPrompt.prompt();
        
        deferredPrompt.userChoice.then((choiceResult) => {
            if (choiceResult.outcome === 'accepted') {
                console.log('✅ Usuario aceptó instalar la app');
                downloadBtn.classList.add('hidden');
            } else {
                console.log('❌ Usuario canceló la instalación');
            }
            deferredPrompt = null;
        });
    }

    // También ocultar el botón si la app se instala después
    window.addEventListener('appinstalled', () => {
        console.log('✅ PWA instalada correctamente');
        downloadBtn.classList.add('hidden');
        deferredPrompt = null;
    });

    // Inicialización
    window.onload = () => {
        updateGreeting();
        renderMonths();
        updateDaysScreen();
        randomizeImage();
    };

    function updateGreeting() {
        const h = new Date().getHours();
        let greet = (h < 12) ? "Buenos días" : (h < 19) ? "Buenas tardes" : "Buenas noches";
        document.getElementById('greeting-text').textContent = greet;
    }

    function renderMonths() {
        const grid = document.getElementById('months-grid');
        grid.innerHTML = '';
        
        months.forEach((month, index) => {
            const card = document.createElement('div');
            card.className = 'month-card';
            
            let monthImage;
            if (userImages.length > 0 && Math.random() > 0.3) {
                monthImage = userImages[Math.floor(Math.random() * userImages.length)];
            } else {
                const r = Math.floor(Math.random() * totalDefaultImages) + 1;
                monthImage = `album/${r}.png`;
            }
            
            card.style.backgroundImage = `url('${monthImage}')`;
            card.onclick = () => selectMonth(index);
            
            if (index === currentMonth && currentYear === new Date().getFullYear()) {
                card.style.borderColor = 'var(--blue)';
            }
            
            card.innerHTML = `
                <div class="month-name">${monthsShort[index]}</div>
                <div class="month-number">${month}</div>
                <div class="month-year">${currentYear}</div>
            `;
            
            grid.appendChild(card);
        });
    }

    function selectMonth(monthIndex) {
        selectedMonth = monthIndex;
        selectedYear = currentYear;
        document.getElementById('selected-month-display').textContent = `${months[monthIndex]} ${currentYear}`;
        updateDaysScreen();
        
        document.getElementById('months-screen').classList.remove('active');
        document.getElementById('days-screen').classList.add('active');
    }

    function goToMonths() {
        document.getElementById('days-screen').classList.remove('active');
        document.getElementById('months-screen').classList.add('active');
        renderMonths();
    }

    function changeMonth(delta) {
        selectedMonth += delta;
        if (selectedMonth < 0) {
            selectedMonth = 11;
            selectedYear--;
        } else if (selectedMonth > 11) {
            selectedMonth = 0;
            selectedYear++;
        }
        document.getElementById('selected-month-display').textContent = `${months[selectedMonth]} ${selectedYear}`;
        updateDaysScreen();
    }

    function updateDaysScreen() {
        document.getElementById('current-month-title').textContent = months[selectedMonth];
        renderCalendar();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendar-days');
        grid.innerHTML = "";
        
        const firstDay = new Date(selectedYear, selectedMonth, 1).getDay();
        const lastDate = new Date(selectedYear, selectedMonth + 1, 0).getDate();
        
        let startOffset = firstDay === 0 ? 6 : firstDay - 1;
        
        for (let i = 0; i < startOffset; i++) {
            grid.innerHTML += `<div class="day-btn" style="visibility: hidden;"></div>`;
        }
        
        const today = new Date();
        for (let d = 1; d <= lastDate; d++) {
            const dayBtn = document.createElement('button');
            dayBtn.className = 'day-btn';
            dayBtn.textContent = d;
            
            if (d === today.getDate() && selectedMonth === today.getMonth() && selectedYear === today.getFullYear()) {
                dayBtn.classList.add('today');
            }
            
            const noteId = `nota_${d}_${selectedMonth}_${selectedYear}`;
            if (localStorage.getItem(noteId)) {
                dayBtn.classList.add('has-note');
            }
            
            dayBtn.onclick = () => openDay(d);
            grid.appendChild(dayBtn);
        }
    }

    function openDay(day) {
        const noteId = `nota_${day}_${selectedMonth}_${selectedYear}`;
        document.getElementById('modal-title').textContent = `${day} ${months[selectedMonth]} ${selectedYear}`;
        document.getElementById('note-text').value = localStorage.getItem(noteId) || "";
        document.getElementById('note-modal').style.display = "flex";
        window.currentNoteId = noteId;
    }

    function selectImageForDay(day) {
        let finalImg;
        
        if (userImages.length > 0 && Math.random() > 0.3) {
            finalImg = userImages[Math.floor(Math.random() * userImages.length)];
        } else {
            const r = Math.floor(Math.random() * totalDefaultImages) + 1;
            finalImg = `album/${r}.png`;
        }
        
        currentPreviewImage = finalImg;
        
        document.getElementById('dynamic-background').style.backgroundImage = `url('${finalImg}')`;
        document.getElementById('day-preview').src = finalImg;
    }

    function randomizeImage() {
        selectImageForDay(new Date().getDate());
    }

    function closeModal() {
        if (window.currentNoteId) {
            localStorage.setItem(window.currentNoteId, document.getElementById('note-text').value);
        }
        document.getElementById('note-modal').style.display = "none";
        renderCalendar();
    }

    function handleFiles(files) {
        for (let file of files) {
            const reader = new FileReader();
            reader.onload = (e) => {
                userImages.push(e.target.result);
                localStorage.setItem('user_album', JSON.stringify(userImages));
                alert(`📸 ¡Foto añadida! (Total: ${userImages.length})`);
                randomizeImage();
                if (document.getElementById('months-screen').classList.contains('active')) {
                    renderMonths();
                }
            };
            reader.readAsDataURL(file);
        }
    }

    function changeYear(delta) {
        currentYear += delta;
        renderMonths();
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && document.getElementById('note-modal').style.display === 'flex') {
            closeModal();
        }
    });

    document.getElementById('note-modal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('note-modal')) {
            closeModal();
        }
    });
</script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(registration => {
                    console.log('✅ Service Worker registrado con éxito:', registration.scope);
                })
                .catch(error => {
                    console.log('❌ Error al registrar el Service Worker:', error);
                });
        });
    }
</script>
